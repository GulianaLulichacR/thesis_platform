services:
  api:
    build: .
    container_name: thesis-platform-api

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/data
      - ./vector_db:/app/vector_db

    restart: unless-stopped

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  streamlit:
    build:
      context: .
      dockerfile: frontend_streamlit/Dockerfile
    container_name: thesis-platform-streamlit
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_BACKEND_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped
